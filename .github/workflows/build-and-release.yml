name: Build and Release

on:
  push:
    branches:
      - main

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get version info from gradle.properties
        id: get_info
        run: |
          VERSION=$(grep 'mod_version' gradle.properties | cut -d'=' -f2 | xargs)
          MC_VERSION=$(grep 'minecraft_version' gradle.properties | cut -d'=' -f2 | xargs | head -n 1)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "MC_VERSION=$MC_VERSION" >> $GITHUB_OUTPUT

      - name: Check if release exists
        id: check_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.get_info.outputs.VERSION }}"
          if gh release view "$VERSION" > /dev/null 2>&1; then
            echo "Release $VERSION already exists. Skipping."
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "Release $VERSION does not exist. Proceeding."
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up JDK 17
        if: steps.check_release.outputs.exists == 'false'
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        if: steps.check_release.outputs.exists == 'false'
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false # Позволяет обновлять кеш при пуше в main

      - name: Build with Gradle
        if: steps.check_release.outputs.exists == 'false'
        run: chmod +x gradlew && ./gradlew build

      - name: Create Release and Upload Artifact
        if: steps.check_release.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.get_info.outputs.VERSION }}"
          MC_VERSION="${{ steps.get_info.outputs.MC_VERSION }}"
          echo "Debug: VERSION=$VERSION, MC_VERSION=$MC_VERSION"
          ls -R build/libs/
          
          # Collect all JAR files from build/libs/
          JAR_FILES=$(find build/libs/ -maxdepth 1 -name "*.jar" | tr '\n' ' ')
          
          if [ -n "$JAR_FILES" ]; then
            gh release create "$VERSION" $JAR_FILES --title "Release $VERSION" --notes "Automated release for version $VERSION (Minecraft $MC_VERSION)"
          else
            echo "No JAR files found in build/libs/!"
            exit 1
          fi
